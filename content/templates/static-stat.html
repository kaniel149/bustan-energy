<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080, height=1080">
<title>TM Energy — Single Stat</title>

<!-- Google Fonts -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=DM+Sans:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">

<style>
  /* ── Reset ─────────────────────────────────────────────────── */
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  /* ── Brand Tokens ──────────────────────────────────────────── */
  :root {
    --bg:       #0A1628;
    --bg-card:  rgba(255, 255, 255, 0.04);
    --border:   rgba(255, 255, 255, 0.08);
    --gold:     #E8A820;
    --green:    #1A7A5A;
    --green-lt: #22C97A;
    --navy:     #0D2137;
    --white:    #FFFFFF;
    --muted:    #94A3B8;
    --font-heading: 'Space Grotesk', system-ui, sans-serif;
    --font-body:    'DM Sans', system-ui, sans-serif;
  }

  /* ── Canvas ────────────────────────────────────────────────── */
  html, body {
    width:  1080px;
    height: 1080px;
    overflow: hidden;
    background: var(--bg);
    font-family: var(--font-body);
    color: var(--white);
    -webkit-font-smoothing: antialiased;
  }

  body {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 48px 64px 44px;
    position: relative;
  }

  /* ── Subtle grid + radial glow ─────────────────────────────── */
  body::before {
    content: '';
    position: absolute;
    inset: 0;
    background:
      radial-gradient(ellipse 70% 50% at 50% 40%, rgba(232, 168, 32, 0.06) 0%, transparent 70%),
      linear-gradient(rgba(255,255,255,0.015) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.015) 1px, transparent 1px);
    background-size: 100% 100%, 60px 60px, 60px 60px;
    pointer-events: none;
    z-index: 0;
  }

  /* ── Gold glow ring behind stat ────────────────────────────── */
  .glow-ring {
    position: absolute;
    width: 420px;
    height: 420px;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -55%);
    border-radius: 50%;
    background: radial-gradient(circle, rgba(232, 168, 32, 0.08) 0%, rgba(232, 168, 32, 0.03) 40%, transparent 70%);
    border: 1px solid rgba(232, 168, 32, 0.06);
    pointer-events: none;
    z-index: 0;
  }

  /* ── Content wrapper ───────────────────────────────────────── */
  .content {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    position: relative;
    z-index: 1;
  }

  /* ── Massive stat number ───────────────────────────────────── */
  .stat {
    font-family: var(--font-heading);
    font-weight: 700;
    font-size: 96px;
    line-height: 1;
    letter-spacing: -0.03em;
    color: var(--gold);
    margin-bottom: 28px;
  }

  /* ── Context line ──────────────────────────────────────────── */
  .context {
    font-family: var(--font-heading);
    font-weight: 500;
    font-size: 28px;
    line-height: 1.35;
    color: var(--white);
    max-width: 680px;
    margin-bottom: 20px;
  }

  /* ── Subtle detail ─────────────────────────────────────────── */
  .detail {
    font-family: var(--font-body);
    font-weight: 400;
    font-size: 18px;
    line-height: 1.5;
    color: var(--muted);
    max-width: 560px;
  }

  /* ── Brand footer (bottom right) ───────────────────────────── */
  .brand-footer {
    position: absolute;
    bottom: 44px;
    right: 64px;
    display: flex;
    align-items: center;
    gap: 10px;
    z-index: 1;
  }

  .brand-footer .sun-icon {
    width: 22px;
    height: 22px;
    position: relative;
  }

  .brand-footer .sun-icon::before {
    content: '';
    position: absolute;
    inset: 4px;
    border-radius: 50%;
    background: var(--gold);
  }

  .brand-footer .sun-icon::after {
    content: '';
    position: absolute;
    inset: 0;
    border-radius: 50%;
    border: 2px solid var(--gold);
    opacity: 0.4;
  }

  .brand-footer span {
    font-family: var(--font-heading);
    font-weight: 600;
    font-size: 16px;
    letter-spacing: 0.14em;
    color: rgba(255, 255, 255, 0.45);
    text-transform: uppercase;
  }
</style>
</head>

<body>

  <!-- Gold glow ring -->
  <div class="glow-ring"></div>

  <!-- Main content -->
  <div class="content">
    <div class="stat" id="stat">0</div>
    <div class="context" id="context">Context line goes here</div>
    <div class="detail" id="detail">Supporting detail text.</div>
  </div>

  <!-- Brand footer -->
  <div class="brand-footer">
    <div class="sun-icon"></div>
    <span>TM Energy</span>
  </div>

<script>
  // ── URL param reader ──────────────────────────────────────────
  const params  = new URLSearchParams(window.location.search);
  const stat    = params.get('stat');
  const context = params.get('context');
  const detail  = params.get('detail');

  if (stat)    document.getElementById('stat').textContent    = stat;
  if (context) document.getElementById('context').textContent = context;
  if (detail)  document.getElementById('detail').textContent  = detail;
</script>

</body>
</html>
