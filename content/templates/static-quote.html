<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080, height=1080">
<title>TM Energy — Brand Quote</title>

<!-- Google Fonts -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=DM+Sans:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">

<style>
  /* ── Reset ─────────────────────────────────────────────────── */
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  /* ── Brand Tokens ──────────────────────────────────────────── */
  :root {
    --bg:       #0A1628;
    --bg-card:  rgba(255, 255, 255, 0.04);
    --border:   rgba(255, 255, 255, 0.08);
    --gold:     #E8A820;
    --green:    #1A7A5A;
    --green-lt: #22C97A;
    --navy:     #0D2137;
    --white:    #FFFFFF;
    --muted:    #94A3B8;
    --font-heading: 'Space Grotesk', system-ui, sans-serif;
    --font-body:    'DM Sans', system-ui, sans-serif;
  }

  /* ── Canvas ────────────────────────────────────────────────── */
  html, body {
    width:  1080px;
    height: 1080px;
    overflow: hidden;
    background: var(--bg);
    font-family: var(--font-body);
    color: var(--white);
    -webkit-font-smoothing: antialiased;
  }

  body {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 48px 64px 44px;
    position: relative;
  }

  /* ── Subtle grid + radial glow ─────────────────────────────── */
  body::before {
    content: '';
    position: absolute;
    inset: 0;
    background:
      radial-gradient(ellipse 70% 50% at 50% 40%, rgba(232, 168, 32, 0.06) 0%, transparent 70%),
      linear-gradient(rgba(255,255,255,0.015) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.015) 1px, transparent 1px);
    background-size: 100% 100%, 60px 60px, 60px 60px;
    pointer-events: none;
    z-index: 0;
  }

  /* ── Glassmorphism Card ────────────────────────────────────── */
  .card {
    width: 100%;
    max-width: 880px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 80px 64px 72px;
    border-radius: 28px;
    background: var(--bg-card);
    border: 1px solid var(--border);
    backdrop-filter: blur(24px);
    -webkit-backdrop-filter: blur(24px);
    position: relative;
    z-index: 1;
    overflow: hidden;
  }

  /* Card inner glow */
  .card::before {
    content: '';
    position: absolute;
    inset: 0;
    border-radius: 28px;
    background: radial-gradient(ellipse 80% 60% at 50% 0%, rgba(232, 168, 32, 0.04) 0%, transparent 60%);
    pointer-events: none;
  }

  /* ── Opening quotation mark ────────────────────────────────── */
  .quote-mark {
    font-size: 120px;
    line-height: 1;
    color: var(--gold);
    opacity: 0.85;
    font-family: Georgia, 'Times New Roman', serif;
    align-self: flex-start;
    margin-left: 24px;
    margin-bottom: -20px;
    position: relative;
    z-index: 1;
  }

  /* ── Quote text ────────────────────────────────────────────── */
  .quote-text {
    font-family: var(--font-heading);
    font-weight: 600;
    font-size: 36px;
    line-height: 1.4;
    letter-spacing: -0.005em;
    color: var(--white);
    max-width: 700px;
    margin-bottom: 40px;
    position: relative;
  }

  /* ── Gold separator line ───────────────────────────────────── */
  .separator {
    width: 80px;
    height: 2px;
    background: var(--gold);
    opacity: 0.6;
    margin-bottom: 28px;
    position: relative;
  }

  /* ── Attribution ───────────────────────────────────────────── */
  .attribution {
    font-family: var(--font-body);
    font-weight: 400;
    font-size: 18px;
    color: var(--muted);
    letter-spacing: 0.02em;
    position: relative;
  }

  .attribution:empty {
    display: none;
  }

  /* ── Brand footer (bottom right) ───────────────────────────── */
  .brand-footer {
    position: absolute;
    bottom: 44px;
    right: 64px;
    display: flex;
    align-items: center;
    gap: 10px;
    z-index: 1;
  }

  .brand-footer .sun-icon {
    width: 22px;
    height: 22px;
    position: relative;
  }

  .brand-footer .sun-icon::before {
    content: '';
    position: absolute;
    inset: 4px;
    border-radius: 50%;
    background: var(--gold);
  }

  .brand-footer .sun-icon::after {
    content: '';
    position: absolute;
    inset: 0;
    border-radius: 50%;
    border: 2px solid var(--gold);
    opacity: 0.4;
  }

  .brand-footer span {
    font-family: var(--font-heading);
    font-weight: 600;
    font-size: 16px;
    letter-spacing: 0.14em;
    color: rgba(255, 255, 255, 0.45);
    text-transform: uppercase;
  }
</style>
</head>

<body>

  <!-- Main content card -->
  <div class="card">
    <div class="quote-mark">&ldquo;</div>
    <div class="quote-text" id="quote">Quote text goes here.</div>
    <div class="separator"></div>
    <div class="attribution" id="attribution"></div>
  </div>

  <!-- Brand footer -->
  <div class="brand-footer">
    <div class="sun-icon"></div>
    <span>TM Energy</span>
  </div>

<script>
  // ── URL param reader ──────────────────────────────────────────
  const params = new URLSearchParams(window.location.search);
  const quote  = params.get('quote');
  const by     = params.get('by');

  if (quote) document.getElementById('quote').textContent       = quote;
  if (by)    document.getElementById('attribution').textContent = '— ' + by;
</script>

</body>
</html>
