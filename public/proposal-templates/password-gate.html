<style id="gate-style">
  body { overflow: hidden !important; }
  .pg-overlay { position:fixed;inset:0;z-index:99999;background:linear-gradient(135deg,#0D2137 0%,#132D4A 100%);display:flex;align-items:center;justify-content:center;color:white;font-family:'Heebo',system-ui,sans-serif;direction:rtl; }
  .pg-box { background:rgba(255,255,255,.05);border:1px solid rgba(232,168,32,.2);border-radius:20px;padding:48px 40px;max-width:400px;width:90%;text-align:center;backdrop-filter:blur(20px); }
  .pg-logo { width:80px;height:80px;margin:0 auto 20px;border-radius:50%;display:block; }
  .pg-brand { color:#E8A820;font-weight:800;font-size:13px;letter-spacing:2.5px;margin-bottom:8px; }
  .pg-title { font-size:22px;font-weight:900;margin-bottom:8px; }
  .pg-desc { color:rgba(255,255,255,.6);font-size:14px;margin-bottom:28px;line-height:1.6; }
  .pg-input { width:100%;padding:14px 16px;border-radius:12px;background:rgba(255,255,255,.08);border:1px solid rgba(232,168,32,.25);color:white;font-size:18px;text-align:center;letter-spacing:8px;font-weight:700;margin-bottom:16px;direction:ltr; }
  .pg-input:focus { outline:none;border-color:#E8A820;background:rgba(255,255,255,.12); }
  .pg-btn { width:100%;padding:14px;background:#E8A820;color:#0D2137;border:none;border-radius:100px;font-weight:800;font-size:15px;cursor:pointer;letter-spacing:.5px; }
  .pg-btn:hover { background:#D49010; } .pg-btn:disabled { opacity:.6;cursor:wait; }
  .pg-error { color:#ff6b6b;font-size:13px;margin-top:12px;min-height:18px; }
  .pg-ref { color:rgba(255,255,255,.4);font-size:11px;margin-top:24px;letter-spacing:1.5px;font-family:monospace; }
</style>
<div class="pg-overlay" id="pgOverlay">
  <div class="pg-box">
    <img src="/proposals/tm-energy-logo.png" alt="TM Energy" class="pg-logo">
    <div class="pg-brand">TM ENERGY</div>
    <h1 class="pg-title">הצעת מחיר אישית</h1>
    <p class="pg-desc">הכנס את הסיסמה שנשלחה אליך ב-WhatsApp.</p>
    <input type="text" inputmode="numeric" pattern="[0-9]*" maxlength="6" class="pg-input" id="pgInput" placeholder="● ● ● ● ● ●" autocomplete="off" autofocus>
    <button class="pg-btn" id="pgBtn">פתח הצעה</button>
    <div class="pg-error" id="pgError"></div>
    <div class="pg-ref">REF · {{ref}}</div>
  </div>
</div>
<script>
(function(){
  const REF="{{ref}}", HASH="{{password_hash}}", API="/api/proposal-view";
  const uKey='tm_unlocked_'+REF;
  async function sha256hex(s){ const b=new TextEncoder().encode(s); const h=await crypto.subtle.digest('SHA-256',b); return Array.from(new Uint8Array(h)).map(x=>x.toString(16).padStart(2,'0')).join(''); }
  async function logView(p){ try{await fetch(API,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({ref:REF,password:p})});}catch(e){} }
  function unlock(){ document.getElementById('gate-style')?.remove(); document.getElementById('pgOverlay')?.remove(); document.body.style.overflow=''; }
  async function tryUnlock(pw){ const h=await sha256hex(pw.trim()); if(h===HASH){ localStorage.setItem(uKey,'1'); logView(pw); unlock(); return true; } return false; }
  const input=document.getElementById('pgInput'), btn=document.getElementById('pgBtn'), err=document.getElementById('pgError');
  async function handle(){ err.textContent=''; btn.disabled=true; btn.textContent='בודק...'; const ok=await tryUnlock(input.value); if(!ok){ err.textContent='סיסמה שגויה.'; btn.disabled=false; btn.textContent='פתח הצעה'; fetch(API,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({ref:REF,password:input.value})}).catch(()=>{}); input.value=''; input.focus(); } }
  btn.addEventListener('click',handle);
  input.addEventListener('keydown',e=>{if(e.key==='Enter')handle();});
  if(localStorage.getItem(uKey)==='1'){ unlock(); fetch(API,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({ref:REF,password:'__localStorage__'})}).catch(()=>{}); }
})();
</script>
